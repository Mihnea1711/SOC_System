services:
  monitored_host:
    image: nginx:latest
    container_name: monitored_host

    volumes:
      - ./logs/nginx:/var/log/nginx

    depends_on:
      - kafka

    networks:
      - monitored_net

  # filebeat:
  #   image: docker.elastic.co/beats/filebeat:9.3.1

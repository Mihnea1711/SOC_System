  #   networks:
  #     - pipeline_net
  #     - monitored_net

  packetbeat:
    image: docker.elastic.co/beats/packetbeat:9.3.1
    container_name: packetbeat
    user: root
    network_mode: host

    volumes:
      - ./beats/packetbeat.yml:/usr/share/packetbeat/packetbeat.yml

    cap_add:
      - NET_ADMIN
      - NET_RAW

    depends_on:
      - kafka
      - monitored_host

